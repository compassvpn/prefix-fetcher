name: Fetch and Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'
          check-latest: true

      - name: Fetch IR, CN and RU prefixes
        # Single process so the shared RIR files and BGP table are each
        # downloaded once for all countries, not once per country.
        run: go run . --fetch-ir --fetch-cn --fetch-ru

      - name: Verify output files are non-empty
        run: |
          for f in ir_prefixes_v4.txt ir_prefixes_v6.txt \
                   cn_prefixes_v4.txt cn_prefixes_v6.txt \
                   ru_prefixes_v4.txt ru_prefixes_v6.txt; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is missing or empty; aborting release to protect existing data"
              exit 1
            fi
          done
          echo "All output files present and non-empty"

      - name: Set release variables
        run: |
          echo "RELEASE_TAG=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_DATE=$(date -u +'%A %F %T %Z')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          files: |
            ir_prefixes_v4.txt
            ir_prefixes_v6.txt
            cn_prefixes_v4.txt
            cn_prefixes_v6.txt
            ru_prefixes_v4.txt
            ru_prefixes_v6.txt
          body: |
            Auto Updated at ${{ env.RELEASE_DATE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean older releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 30
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
